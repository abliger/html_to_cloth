<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML on Physical Canvas - Wind Blown Cloth</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #info {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      color: rgba(255, 255, 255, 0.85);
      font-size: 13px;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
    }

    #info h1 {
      font-size: 16px;
      margin-bottom: 4px;
      color: #fff;
    }

    /* 风/控制面板 */
    #controls {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 10;
      background: rgba(20, 20, 28, 0.85);
      backdrop-filter: blur(8px);
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #fff;
      width: 220px;
    }

    #controls label {
      display: block;
      font-size: 12px;
      margin-bottom: 6px;
      color: rgba(255, 255, 255, 0.7);
    }

    #controls input[type="range"] {
      width: 100%;
      margin-bottom: 10px;
    }

    #controls button {
      width: 100%;
      padding: 8px 0;
      border-radius: 6px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
    }

    #controls button:hover {
      background: #1d4ed8;
    }

    #webgl {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #css3d {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* 交互模式下的真实 DOM 覆盖层 */
    #ui-overlay {
      width: 840px;
      height: 560px;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(120, 110, 90, 0.03) 2px, rgba(120, 110, 90, 0.03) 4px),
        repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(120, 110, 90, 0.03) 2px, rgba(120, 110, 90, 0.03) 4px),
        #f7f5f0;
      color: #1f2937;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border-radius: 10px;
      box-shadow: inset 0 0 60px rgba(120, 110, 90, 0.08);
      pointer-events: auto;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    #ui-overlay.visible {
      opacity: 1;
    }

    /* 真实 HTML UI 源，被 html2canvas 捕获后贴到布料上 */
    #ui-source {
      position: fixed;
      left: -9999px;
      top: -9999px;
      width: 840px;
      height: 560px;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(120, 110, 90, 0.03) 2px, rgba(120, 110, 90, 0.03) 4px),
        repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(120, 110, 90, 0.03) 2px, rgba(120, 110, 90, 0.03) 4px),
        #f7f5f0;
      color: #1f2937;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border-radius: 10px;
      box-shadow: inset 0 0 60px rgba(120, 110, 90, 0.08);
    }

    .ui-header {
      height: 44px;
      background: rgba(240, 238, 233, 0.9);
      border-bottom: 1px solid rgba(120, 110, 90, 0.15);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      flex-shrink: 0;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .dot.red { background: #ef4444; }
    .dot.yellow { background: #f59e0b; }
    .dot.green { background: #10b981; }

    .ui-body {
      flex: 1;
      padding: 36px;
      display: flex;
      gap: 28px;
      overflow: auto;
    }

    .ui-sidebar {
      width: 200px;
      flex-shrink: 0;
    }

    .ui-sidebar h3 {
      font-size: 12px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0 0 14px;
    }

    .ui-sidebar button {
      width: 100%;
      text-align: left;
      padding: 11px 13px;
      margin-bottom: 7px;
      border-radius: 7px;
      border: none;
      background: rgba(230, 228, 222, 0.5);
      color: #374151;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .ui-sidebar button:hover {
      background: rgba(210, 206, 196, 0.7);
    }

    .ui-content {
      flex: 1;
    }

    .ui-content h1 {
      margin: 0 0 10px;
      font-size: 34px;
      color: #111827;
    }

    .ui-content p {
      margin: 0 0 18px;
      line-height: 1.6;
      color: #4b5563;
      font-size: 14px;
    }

    .ui-card {
      padding: 16px;
      border-radius: 11px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(120, 110, 90, 0.12);
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
    }

    .ui-card h4 {
      margin: 0 0 8px;
      font-size: 14px;
      color: #111827;
    }

    .ui-card input,
    .ui-card button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 7px;
      border: 1px solid #d1d5db;
      font-size: 13px;
      margin-bottom: 7px;
      outline: none;
    }

    .ui-card button {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
      cursor: pointer;
      font-weight: 600;
    }

    .ui-card button:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>
  <div id="info">
    <h1>HTML on Physical Canvas</h1>
    <p>风会吹动画布并产生褶皱 · 右上角切换鼠标模式（无影响模式可交互）</p>
  </div>

  <div id="controls">
    <label for="wind">风力强度</label>
    <input id="wind" type="range" min="0" max="100" value="35" />
    <button id="gust">🌬️ 一阵强风</button>
    <button id="mouseMode">🖱️ 鼠标：推动画布</button>
  </div>

  <div id="webgl"></div>
  <!-- CSS3D 层：交互模式下显示真实可交互 DOM -->
  <div id="css3d"></div>

  <!-- 这个 DOM 会被渲染成纹理，贴到可形变的布料网格上 -->
  <div id="ui-source">
    <div class="ui-header">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
    </div>
    <div class="ui-body">
      <div class="ui-sidebar">
        <h3>Navigation</h3>
        <button>Dashboard</button>
        <button>Projects</button>
        <button>Settings</button>
      </div>
      <div class="ui-content">
        <h1>HTML on Cloth</h1>
        <p>这是一块真实的“画布”：DOM 内容被捕获为纹理，贴到由 Verlet 物理驱动的布料网格上。风吹过时，顶点会位移，HTML 内容会跟着几何体一起褶皱、起伏。</p>
        <div class="ui-card">
          <h4>Interactive Form</h4>
          <input type="text" placeholder="Type something here..." />
          <button>Submit</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import {CSS3DRenderer, CSS3DObject} from 'three/addons/renderers/CSS3DRenderer.js';

    // ---------- 参数 ----------
    const CLOTH_WIDTH = 6.0;
    const CLOTH_HEIGHT = 4.0;
    const SEG_X = 60;
    const SEG_Y = 40;
    const ITERATIONS = 5;       // 约束求解迭代次数
    let windStrength = 0.35;    // 基础风力
    let gust = 0;               // 阵风叠加

    // ---------- 场景 ----------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0f);
    scene.fog = new THREE.FogExp2(0x0a0a0f, 0.045);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);

    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.getElementById('webgl').appendChild(renderer.domElement);

    // ---------- CSS3D 渲染器（用于交互模式的可交互 DOM） ----------
    const cssRenderer = new CSS3DRenderer();
    cssRenderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('css3d').appendChild(cssRenderer.domElement);

    // ---------- 灯光 ----------
    const ambient = new THREE.AmbientLight(0xffffff, 0.35);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xfff4e6, 2.2);
    dirLight.position.set(4, 6, 6);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 25;
    dirLight.shadow.camera.left = -6;
    dirLight.shadow.camera.right = 6;
    dirLight.shadow.camera.top = -6;
    dirLight.shadow.camera.bottom = 6;
    dirLight.shadow.bias = -0.0005;
    scene.add(dirLight);

    const rimLight = new THREE.SpotLight(0x6366f1, 3.0);
    rimLight.position.set(-6, 2, -3);
    rimLight.lookAt(0, 0, 0);
    scene.add(rimLight);

    // ---------- 地面 ----------
    const floorGeo = new THREE.PlaneGeometry(40, 40);
    const floorMat = new THREE.MeshStandardMaterial({
      color: 0x111116,
      roughness: 0.85,
      metalness: 0.1,
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -3.5;
    floor.receiveShadow = true;
    scene.add(floor);

    const grid = new THREE.GridHelper(40, 40, 0x2a2a35, 0x16161d);
    grid.position.y = -3.48;
    scene.add(grid);

    // ---------- 画布织物纹理（用作 bump / roughness） ----------
    function createFabricTexture() {
      const size = 512;
      const cvs = document.createElement('canvas');
      cvs.width = size;
      cvs.height = size;
      const ctx = cvs.getContext('2d');

      ctx.fillStyle = '#e8e4dc';
      ctx.fillRect(0, 0, size, size);

      // 经纬线
      ctx.strokeStyle = 'rgba(100, 92, 76, 0.10)';
      ctx.lineWidth = 1;
      for (let i = 0; i < size; i += 4) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, size); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(size, i); ctx.stroke();
      }

      // 噪点
      const imgData = ctx.getImageData(0, 0, size, size);
      for (let i = 0; i < imgData.data.length; i += 4) {
        const n = (Math.random() - 0.5) * 22;
        imgData.data[i] = Math.max(0, Math.min(255, imgData.data[i] + n));
        imgData.data[i + 1] = Math.max(0, Math.min(255, imgData.data[i + 1] + n));
        imgData.data[i + 2] = Math.max(0, Math.min(255, imgData.data[i + 2] + n));
      }
      ctx.putImageData(imgData, 0, 0);

      const tex = new THREE.CanvasTexture(cvs);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(6, 4);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    const fabricTex = createFabricTexture();

    // ---------- 布料物理 ----------
    class Cloth {
      constructor(w, h, segX, segY) {
        this.w = w;
        this.h = h;
        this.segX = segX;
        this.segY = segY;
        this.particles = [];
        this.constraints = [];

        for (let y = 0; y <= segY; y++) {
          for (let x = 0; x <= segX; x++) {
            const u = x / segX;
            const v = y / segY;
            const px = (u - 0.5) * w;
            const py = (0.5 - v) * h; // v=0 在上方
            const pz = 0;
            this.particles.push({
              x: px, y: py, z: pz,
              ox: px, oy: py, oz: pz,
              ix: x, iy: y,
              pinned: false,
            });
          }
        }

        const idx = (x, y) => y * (segX + 1) + x;
        for (let y = 0; y <= segY; y++) {
          for (let x = 0; x <= segX; x++) {
            if (x < segX) this.constraints.push([idx(x, y), idx(x + 1, y), w / segX]);
            if (y < segY) this.constraints.push([idx(x, y), idx(x, y + 1), h / segY]);
          }
        }

        // 固定最上面一整排，像窗帘/画布挂在杆子上
        for (let x = 0; x <= segX; x++) {
          this.particles[idx(x, 0)].pinned = true;
        }
      }
    }

    const cloth = new Cloth(CLOTH_WIDTH, CLOTH_HEIGHT, SEG_X, SEG_Y);

    // ---------- 布料网格 ----------
    const geometry = new THREE.PlaneGeometry(CLOTH_WIDTH, CLOTH_HEIGHT, SEG_X, SEG_Y);
    geometry.attributes.position.usage = THREE.DynamicDrawUsage;

    // 初始时将几何体顶点与布料粒子对齐
    const posAttr = geometry.attributes.position;
    for (let i = 0; i < cloth.particles.length; i++) {
      const p = cloth.particles[i];
      posAttr.setXYZ(i, p.x, p.y, p.z);
    }
    geometry.computeVertexNormals();

    const material = new THREE.MeshStandardMaterial({
      map: null,               // 稍后替换为 HTML 纹理
      bumpMap: fabricTex,
      bumpScale: 0.035,
      roughness: 0.92,
      metalness: 0.02,
      side: THREE.DoubleSide,
    });

    const clothMesh = new THREE.Mesh(geometry, material);
    clothMesh.castShadow = true;
    clothMesh.receiveShadow = true;
    clothMesh.position.y = 0.0;
    clothMesh.rotation.x = -0.06;
    scene.add(clothMesh);

    // ---------- 顶部挂杆 ----------
    const rodGeo = new THREE.CylinderGeometry(0.06, 0.06, CLOTH_WIDTH + 0.5, 16);
    const rodMat = new THREE.MeshStandardMaterial({color: 0x8a8a8a, roughness: 0.3, metalness: 0.8});
    const rod = new THREE.Mesh(rodGeo, rodMat);
    rod.rotation.z = Math.PI / 2;
    rod.position.set(0, CLOTH_HEIGHT / 2, 0);
    rod.castShadow = true;
    clothMesh.add(rod);

    // ---------- 可交互 DOM 覆盖层（仅“无影响”模式显示） ----------
    const overlay = document.createElement('div');
    overlay.id = 'ui-overlay';
    overlay.innerHTML = document.getElementById('ui-source').innerHTML;

    const cssObj = new CSS3DObject(overlay);
    cssObj.position.set(0, 0, 0.02);
    cssObj.scale.set(CLOTH_WIDTH / 840, CLOTH_HEIGHT / 560, 1);
    clothMesh.add(cssObj);

    // 给覆盖层里的表单加交互
    const overlayInput = overlay.querySelector('.ui-card input');
    const overlayBtn = overlay.querySelector('.ui-card button');
    overlayBtn.addEventListener('click', () => {
      overlayBtn.textContent = overlayInput.value ? `Sent: ${overlayInput.value}` : 'Please type first';
    });

    function setOverlayVisible(visible) {
      overlay.classList.toggle('visible', visible);
    }

    // ---------- 鼠标交互 ----------
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const mouseLocal = new THREE.Vector3();
    const prevMouseLocal = new THREE.Vector3();
    const dragLocal = new THREE.Vector3();
    let hasMouse = false;
    let mouseMode = 0; // 0: 推动, 1: 无影响, 2: 拖拽
    let isDragging = false;

    const modeLabels = ['🖱️ 鼠标：推动画布', '🖱️ 鼠标：无影响', '🖱️ 鼠标：拖动画布'];
    const modeBtn = document.getElementById('mouseMode');
    modeBtn.addEventListener('click', () => {
      mouseMode = (mouseMode + 1) % 3;
      modeBtn.textContent = modeLabels[mouseMode];
      isDragging = false;
      setOverlayVisible(mouseMode === 1);
    });

    function raycastCloth(clientX, clientY) {
      pointer.x = (clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      return raycaster.intersectObject(clothMesh);
    }

    window.addEventListener('pointermove', (e) => {
      const hits = raycastCloth(e.clientX, e.clientY);
      if (hits.length > 0) {
        const newLocal = hits[0].point.clone();
        clothMesh.worldToLocal(newLocal);
        if (!hasMouse) prevMouseLocal.copy(newLocal);
        mouseLocal.copy(newLocal);
        hasMouse = true;
      } else {
        hasMouse = false;
      }

      if (isDragging && mouseMode === 2 && hits.length > 0) {
        dragLocal.copy(mouseLocal);
      }
    });

    window.addEventListener('pointerdown', (e) => {
      if (mouseMode !== 2) return;
      const hits = raycastCloth(e.clientX, e.clientY);
      if (hits.length > 0) {
        dragLocal.copy(hits[0].point);
        clothMesh.worldToLocal(dragLocal);
        isDragging = true;
      }
    });

    window.addEventListener('pointerup', () => {
      isDragging = false;
    });

    // ---------- 捕获 HTML 为纹理 ----------
    async function captureHtmlTexture() {
      const source = document.getElementById('ui-source');
      const canvas = await html2canvas(source, {
        scale: 1,
        useCORS: true,
        backgroundColor: null,
        logging: false,
      });
      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.flipY = true;
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      return tex;
    }

    captureHtmlTexture().then((htmlTex) => {
      material.map = htmlTex;
      material.needsUpdate = true;
    });

    // 固定摄像头
    camera.position.set(0, -0.2, 8.5);
    camera.lookAt(0, -0.8, 0);

    // ---------- 风控制 ----------
    const windInput = document.getElementById('wind');
    windInput.addEventListener('input', (e) => {
      windStrength = parseInt(e.target.value, 10) / 100;
    });

    document.getElementById('gust').addEventListener('click', () => {
      gust = 1.6;
    });

    // ---------- 动画 / 物理更新 ----------
    const clock = new THREE.Clock();
    const gravity = new THREE.Vector3(0, -2.8, 0);

    function updateCloth(dt, time) {
      const totalWind = mouseMode === 1 ? 0 : (windStrength + gust);
      if (mouseMode === 1) gust = 0;

      // 鼠标移动带来的局部推力
      let mouseDx = 0, mouseDy = 0, mouseDz = 0;
      if (hasMouse) {
        mouseDx = mouseLocal.x - prevMouseLocal.x;
        mouseDy = mouseLocal.y - prevMouseLocal.y;
        mouseDz = mouseLocal.z - prevMouseLocal.z;
      }

      for (const p of cloth.particles) {
        if (p.pinned) continue;

        // 无影响模式：把画布摊平，让上面的真实 DOM 可交互
        if (mouseMode === 1) {
          const targetX = (p.ix / SEG_X - 0.5) * CLOTH_WIDTH;
          const targetY = (0.5 - p.iy / SEG_Y) * CLOTH_HEIGHT;
          p.x = THREE.MathUtils.lerp(p.x, targetX, dt * 3);
          p.y = THREE.MathUtils.lerp(p.y, targetY, dt * 3);
          p.z = THREE.MathUtils.lerp(p.z, 0, dt * 4);
          p.ox = p.x;
          p.oy = p.y;
          p.oz = p.z;
          continue;
        }

        // 风场：随位置和时间变化，制造不规则起伏
        const wind = new THREE.Vector3(
          Math.sin(time * 1.6 + p.y * 2.4) * 0.4 + Math.cos(time * 0.7 + p.x * 3.0) * 0.2,
          Math.sin(time * 1.1 + p.x * 1.8) * 0.15,
          Math.sin(time * 2.2 + p.x * 4.0 + p.y * 2.5) * 0.5 + 0.55
        ).multiplyScalar(totalWind * (0.85 + Math.random() * 0.3));

        const force = new THREE.Vector3().addVectors(gravity, wind);

        const damping = 0.985;
        const vx = (p.x - p.ox) * damping;
        const vy = (p.y - p.oy) * damping;
        const vz = (p.z - p.oz) * damping;

        p.ox = p.x;
        p.oy = p.y;
        p.oz = p.z;

        p.x += vx + force.x * dt * dt;
        p.y += vy + force.y * dt * dt;
        p.z += vz + force.z * dt * dt;

        // 鼠标模式 0：划过/移动时把附近粒子朝移动方向顶出去
        if (mouseMode === 0 && hasMouse) {
          const dx = p.x - mouseLocal.x;
          const dy = p.y - mouseLocal.y;
          const dz = p.z - mouseLocal.z;
          const dist2 = dx * dx + dy * dy + dz * dz;
          const radius = 0.85;
          if (dist2 < radius * radius) {
            const falloff = 1 - dist2 / (radius * radius);
            const pushZ = Math.max(0.02, Math.abs(mouseDx) + Math.abs(mouseDy)) * 8;
            p.x += (mouseDx * 10 + dx * 0.15) * falloff * dt;
            p.y += (mouseDy * 10 + dy * 0.15) * falloff * dt;
            p.z += (mouseDz * 10 + pushZ) * falloff * dt;
          }
        }

        // 鼠标模式 2：按住拖拽时，把附近粒子用弹簧力拉向拖拽点
        if (mouseMode === 2 && isDragging) {
          const dx = p.x - dragLocal.x;
          const dy = p.y - dragLocal.y;
          const dz = p.z - dragLocal.z;
          const dist2 = dx * dx + dy * dy + dz * dz;
          const radius = 1.0;
          if (dist2 < radius * radius) {
            const falloff = 1 - dist2 / (radius * radius);
            const strength = 7;
            p.x -= dx * strength * falloff * dt;
            p.y -= dy * strength * falloff * dt;
            p.z -= dz * strength * falloff * dt;
          }
        }
      }

      // 约束求解
      for (let k = 0; k < ITERATIONS; k++) {
        for (const c of cloth.constraints) {
          const p1 = cloth.particles[c[0]];
          const p2 = cloth.particles[c[1]];
          const rest = c[2];

          const dx = p2.x - p1.x;
          const dy = p2.y - p1.y;
          const dz = p2.z - p1.z;
          const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
          if (dist === 0) continue;

          const diff = (dist - rest) / dist;
          const offsetX = dx * diff * 0.5;
          const offsetY = dy * diff * 0.5;
          const offsetZ = dz * diff * 0.5;

          if (!p1.pinned) {
            p1.x += offsetX;
            p1.y += offsetY;
            p1.z += offsetZ;
          }
          if (!p2.pinned) {
            p2.x -= offsetX;
            p2.y -= offsetY;
            p2.z -= offsetZ;
          }
        }
      }

      // 同步到几何体
      for (let i = 0; i < cloth.particles.length; i++) {
        const p = cloth.particles[i];
        posAttr.setXYZ(i, p.x, p.y, p.z);
      }
      posAttr.needsUpdate = true;
      geometry.computeVertexNormals();

      prevMouseLocal.copy(mouseLocal);
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);
      const time = clock.getElapsedTime();

      updateCloth(dt, time);
      renderer.render(scene, camera);
      cssRenderer.render(scene, camera);
    }
    animate();

    // ---------- 响应式 ----------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      cssRenderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>

</html>
